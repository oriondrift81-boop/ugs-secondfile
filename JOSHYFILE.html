<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGS Files - JOSHY Edition</title>
    <style>
        html { scroll-behavior: smooth; }

        /* THEME VARIABLES */
        :root {
            --bg-gradient: linear-gradient(135deg, #2e1a47 0%, #3f1f66 100%);
            --sidebar-bg: rgba(30, 0, 50, 0.7);
            --text-color: #ffffff;
            --accent-color: #d8b4ff;
            --btn-bg: linear-gradient(145deg, #7b2cbf, #5a189a);
            --btn-hover: linear-gradient(145deg, #9d4edd, #7b2cbf);
            --card-shadow: rgba(0,0,0,0.4);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f0f2f5 0%, #c9ced6 100%);
            --sidebar-bg: rgba(200, 200, 200, 0.8);
            --text-color: #1a1a1a;
            --accent-color: #5a189a;
            --btn-bg: linear-gradient(145deg, #5a189a, #3c096c);
            --btn-hover: linear-gradient(145deg, #7b2cbf, #5a189a);
            --card-shadow: rgba(0,0,0,0.1);
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            transition: background 0.3s ease;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 100vh;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            padding: 20px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 2px 0 15px var(--card-shadow);
        }

        .nav-letter {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            padding: 8px;
            width: 30px;
            text-align: center;
            border-radius: 5px;
            transition: 0.2s;
        }
        .nav-letter:hover { transform: scale(1.2); color: var(--text-color); }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 80px;
            flex: 1;
            padding: 20px;
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { text-shadow: 0 0 15px rgba(200,150,255,0.4); }

        /* SEARCH STYLES */
        .search-container {
            margin: 20px auto;
            max-width: 600px;
        }
        #game-search {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        #game-search:focus { background: rgba(255,255,255, 0.2); box-shadow: 0 0 10px var(--accent-color); }

        .controls-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
        }

        /* BUTTONS */
        .top-btn {
            background: #ffaa00;
            color: #2e1a47;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(255, 170, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255, 170, 0, 0.5); }
        .dice-btn { font-size: 20px; padding: 8px 15px; }

        /* GAME STYLES */
        .letter-header {
            color: var(--accent-color) !important;
            font-size: 32px;
            margin: 40px 0 20px 0;
            border-bottom: 2px solid var(--accent-color);
            scroll-margin-top: 20px;
        }

        .buttons-container { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            align-items: center; 
        }

        /* GRID VIEW STYLES */
        .grid-view .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            align-items: stretch;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-item { position: relative; width: 100%; max-width: 600px; transition: transform 0.2s; }
        
        .grid-view .game-item { max-width: none; }

        .grid-view input[type="button"] {
            height: 100px;
            text-align: center;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            white-space: normal;
            line-height: 1.2;
        }

        input[type="button"] {
            background: var(--btn-bg);
            border: none;
            padding: 15px 45px 15px 20px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            color: white;
            text-align: left;
            transition: 0.2s;
            box-sizing: border-box;
        }
        input[type="button"]:hover { background: var(--btn-hover); transform: scale(1.02); }

        .star { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; cursor: pointer; color: rgba(255, 255, 255, 0.3); z-index: 5; }
        .star.favorited { color: gold; }
        
        #favorites-section h2 { color: gold; border-bottom: 2px solid gold; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar-nav"></div>

<div class="main-content" id="main-content">
    <div class="header-container">
        <h1>Made by JOSHY</h1>
        
        <div class="search-container">
            <input type="text" id="game-search" placeholder="Search for a game..." onkeyup="filterGames()">
        </div>

        <div class="controls-row">
            <button class="top-btn" id="view-toggle" onclick="toggleView()">田 Grid View</button>
            <button class="top-btn dice-btn" onclick="playRandomGame()" title="Random Game">🎲</button>
            <button class="top-btn" id="theme-toggle" onclick="toggleTheme()">🌙 Mode</button>
            <button class="top-btn" id="delete-mode-toggle" onclick="toggleDeleteMode()" style="background: #ff4444; color: white;">🗑️ Delete Mode: OFF</button>
            <button class="top-btn" onclick="resetDeletedGames()" style="background: #44ff44; color: #1a1a1a;">🔄 Undo All</button>
        </div>
    </div>

    <div id="favorites-section">
        <h2>⭐ Favorites</h2>
        <div id="favorites-container" class="buttons-container"></div>
    </div>

    <div id="sections-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/games.js"></script>

<script>
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
    let deleteMode = false;
    let deletedGames = JSON.parse(localStorage.getItem("deletedGames") || "[]");

    // PANIC KEY: Redirect to Canvas on ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") window.location.href = "https://canvas.instructure.com";
    });

    // DELETE MODE LOGIC
    function toggleDeleteMode() {
        deleteMode = !deleteMode;
        const btn = document.getElementById('delete-mode-toggle');
        btn.innerText = deleteMode ? "🗑️ Delete Mode: ON" : "🗑️ Delete Mode: OFF";
        btn.style.boxShadow = deleteMode ? "0 0 20px #ff4444" : "none";
    }

    function resetDeletedGames() {
        if (confirm("Restore all hidden games?")) {
            localStorage.removeItem("deletedGames");
            location.reload();
        }
    }

    function applyDeletions() {
        document.querySelectorAll(".game-item").forEach(item => {
            const btn = item.querySelector("input[type='button']");
            if (btn && deletedGames.includes(btn.value)) {
                item.style.display = "none";
            }
        });
    }

    // VIEW TOGGLE
    function toggleView() {
        const content = document.getElementById('main-content');
        const btn = document.getElementById('view-toggle');
        const isGrid = content.classList.toggle('grid-view');
        localStorage.setItem("viewMode", isGrid ? "grid" : "list");
        btn.innerText = isGrid ? "☰ List View" : "田 Grid View";
    }

    if (localStorage.getItem("viewMode") === "grid") {
        document.getElementById('main-content').classList.add('grid-view');
        document.getElementById('view-toggle').innerText = "☰ List View";
    }

    // SEARCH
    function filterGames() {
        const query = document.getElementById('game-search').value.toLowerCase();
        const gameItems = document.querySelectorAll('#sections-container .game-item');
        
        gameItems.forEach(item => {
            const btn = item.querySelector('input[type="button"]');
            const isMatch = btn.value.toLowerCase().includes(query) && !deletedGames.includes(btn.value);
            item.style.display = isMatch ? "block" : "none";
        });
    }

    // THEME
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        document.getElementById("theme-toggle").innerText = newTheme === "light" ? "☀️ Mode" : "🌙 Mode";
    }

    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);

    // FAVORITES
    function toggleFavorite(btnValue) {
        if (favorites.includes(btnValue)) {
            favorites = favorites.filter(f => f !== btnValue);
        } else {
            favorites.push(btnValue);
        }
        localStorage.setItem("favorites", JSON.stringify(favorites));
        updateStarUI();
        renderFavorites();
    }

    function renderFavorites() {
        const container = document.getElementById("favorites-container");
        container.innerHTML = "";
        favorites.forEach(name => {
            if (deletedGames.includes(name)) return;
            const allBtns = [...document.querySelectorAll("#sections-container input[type='button']")];
            const original = allBtns.find(btn => btn.value === name);
            if (original) {
                const wrapper = document.createElement("div");
                wrapper.className = "game-item";
                const clone = original.cloneNode(true);
                clone.onclick = () => original.click();
                const star = document.createElement("span");
                star.innerHTML = "★";
                star.className = "star favorited";
                star.onclick = (e) => { e.stopPropagation(); toggleFavorite(name); };
                wrapper.appendChild(clone);
                wrapper.appendChild(star);
                container.appendChild(wrapper);
            }
        });
    }

    function updateStarUI() {
        document.querySelectorAll(".game-item .star").forEach(star => {
            const btn = star.parentElement.querySelector("input[type='button']");
            if (btn) star.classList.toggle("favorited", favorites.includes(btn.value));
        });
    }

    // SIDEBAR
    function buildSidebarNav() {
        const sidebar = document.getElementById("sidebar-nav");
        sidebar.innerHTML = "";
        document.querySelectorAll(".letter-header").forEach(header => {
            const letter = header.innerText.trim();
            header.id = "section-" + letter;
            const navLink = document.createElement("a");
            navLink.href = "#section-" + letter;
            navLink.className = "nav-letter";
            navLink.innerText = letter;
            sidebar.appendChild(navLink);
        });
    }

    // INITIALIZE BUTTONS
    function enhanceButtons() {
        const buttons = document.querySelectorAll("#sections-container input[type='button']");
        buttons.forEach(btn => {
            if (btn.parentElement.classList.contains("game-item")) return;
            const wrapper = document.createElement("div");
            wrapper.className = "game-item";
            btn.parentNode.insertBefore(wrapper, btn);
            wrapper.appendChild(btn);

            // Add Star
            const star = document.createElement("span");
            star.innerHTML = "★";
            star.className = "star";
            star.onclick = (e) => { e.stopPropagation(); toggleFavorite(btn.value); };
            wrapper.appendChild(star);

            // Add Delete Interceptor
            const originalClick = btn.onclick;
            btn.onclick = (e) => {
                if (deleteMode) {
                    e.preventDefault();
                    if (confirm(`Hide ${btn.value} permanently?`)) {
                        deletedGames.push(btn.value);
                        localStorage.setItem("deletedGames", JSON.stringify(deletedGames));
                        applyDeletions();
                        renderFavorites();
                    }
                } else if (originalClick) {
                    originalClick.call(btn, e);
                }
            };
        });
        buildSidebarNav();
        updateStarUI();
        applyDeletions();
        renderFavorites();
    }

    setTimeout(enhanceButtons, 1200);
</script>

</body>
</html>
