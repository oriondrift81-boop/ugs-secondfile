<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortexStash - JOSHY Edition</title>
    <style>
        html { scroll-behavior: smooth; }

        /* THEME VARIABLES */
        :root {
            --bg-gradient: linear-gradient(135deg, #2e1a47 0%, #3f1f66 100%);
            --text-color: #ffffff;
            --accent-color: #d8b4ff;
            --btn-bg: linear-gradient(145deg, #7b2cbf, #5a189a);
            --delete-red: #ff4444;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f0f2f5 0%, #c9ced6 100%);
            --text-color: #1a1a1a;
            --accent-color: #5a189a;
            --btn-bg: linear-gradient(145deg, #5a189a, #3c096c);
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            margin: 0; padding: 0;
            display: block;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* HEADER AREA (Scrolls away) */
        .header-main {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .neon-title {
            margin: 0;
            font-size: 3.5rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 
                0 0 7px #fff,
                0 0 15px var(--accent-color),
                0 0 30px var(--accent-color);
        }

        /* STICKY CONTROLS (Only the buttons stay at the top) */
        .sticky-controls {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg-gradient);
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .search-container {
            margin: 20px auto;
            width: 90%;
            max-width: 500px;
        }

        #gameSearch {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid var(--accent-color);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            font-size: 16px;
        }

        .main-content { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .controls-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }

        .top-btn {
            background: #ffaa00; color: #2e1a47; border: none;
            padding: 10px 20px; font-weight: bold; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
        }

        /* GAME ITEMS */
        .game-item { position: relative; width: 100%; max-width: 600px; margin: 0 auto 10px; }
        .grid-view .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; width: 100%;
        }

        input[type="button"] {
            background: var(--btn-bg); border: none; padding: 15px 45px 15px 20px;
            font-size: 16px; border-radius: 10px; cursor: pointer;
            width: 100%; color: white; text-align: left; transition: 0.2s;
        }

        .game-item.selected-delete input[type="button"] {
            background: var(--delete-red) !important;
            box-shadow: 0 0 15px var(--delete-red);
        }

        .star { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; cursor: pointer; color: rgba(255,255,255,0.3); z-index: 5; }
        .star.favorited { color: gold; }

        .letter-header { color: var(--accent-color); font-size: 32px; margin: 40px 0 20px 0; border-bottom: 2px solid var(--accent-color); text-align: center; }

        #info-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient); z-index: 2000;
            display: none; padding: 50px; box-sizing: border-box;
            overflow-y: auto;
        }
    </style>
</head>
<body onclick="createParticles(event)">

<div id="info-overlay">
    <span class="close-info" onclick="toggleInfo()" style="position: absolute; right: 30px; cursor: pointer; font-size: 40px;">×</span>
    <h1>VortexStash Info</h1>
    <p><em>made by joshy</em></p>
    <ul>
        <li>Select games in Delete Mode to highlight red.</li>
        <li>Click 'Confirm Deletion' to hide selected items.</li>
        <li>Press ESC to go to Canvas.</li>
    </ul>
</div>

<div class="header-main">
    <h1 class="neon-title">VortexStash</h1>
    <p style="font-style: italic; color: var(--accent-color); margin-top: 10px;">made by joshy</p>
    
    <div class="search-container">
        <input type="text" id="gameSearch" placeholder="Search the stash..." onkeyup="searchGames()">
    </div>
</div>

<div class="sticky-controls">
    <div class="controls-row">
        <button class="top-btn" onclick="toggleTheme()">🌙 Mode</button>
        <button class="top-btn" id="view-toggle" onclick="toggleView()">田 Grid View</button>
        <button class="top-btn" onclick="toggleInfo()">❓ Info</button>
        <button class="top-btn" id="delete-mode-toggle" onclick="toggleDeleteMode()" style="background: #ff4444; color: white;">🗑️ Delete Mode</button>
        <button class="top-btn" id="confirm-delete-btn" onclick="bulkDelete()" style="background: #ffffff; color: #ff4444; display: none; border: 2px solid #ff4444;">🔥 Confirm Deletion</button>
        <button class="top-btn" onclick="resetDeletedGames()" style="background: #44ff44;">🔄 Undo All</button>
    </div>
</div>

<div class="main-content" id="main-content">
    <div id="favorites-section">
        <h2 style="color: gold; border-bottom: 2px solid gold; text-align: center;">⭐ Favorites</h2>
        <div id="favorites-container" class="buttons-container" style="display: flex; flex-direction: column; align-items: center;"></div>
    </div>
    <div id="sections-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/games.js"></script>

<script>
    let deleteMode = false;
    let selectedForDeletion = [];
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
    let deletedGames = JSON.parse(localStorage.getItem("deletedGames") || "[]");

    function searchGames() {
        const query = document.getElementById('gameSearch').value.toLowerCase();
        const gameItems = document.querySelectorAll('#sections-container .game-item');
        gameItems.forEach(item => {
            const btn = item.querySelector("input[type='button']");
            const name = btn.value.toLowerCase();
            const isDeleted = deletedGames.includes(btn.value);
            item.style.display = (name.includes(query) && !isDeleted) ? "block" : "none";
        });
        document.querySelectorAll('.letter-header').forEach(header => {
            const nextContainer = header.nextElementSibling;
            const visibleGames = nextContainer.querySelectorAll('.game-item[style="display: block;"]');
            header.style.display = visibleGames.length > 0 ? "block" : "none";
            nextContainer.style.display = visibleGames.length > 0 ? (document.getElementById('main-content').classList.contains('grid-view') ? "grid" : "flex") : "none";
        });
    }

    function toggleDeleteMode() {
        deleteMode = !deleteMode;
        const btn = document.getElementById('delete-mode-toggle');
        const confirmBtn = document.getElementById('confirm-delete-btn');
        btn.style.boxShadow = deleteMode ? "0 0 20px #ff4444" : "none";
        btn.innerText = deleteMode ? "🗑️ Mode: ON" : "🗑️ Delete Mode";
        if (!deleteMode) {
            selectedForDeletion = [];
            document.querySelectorAll('.game-item').forEach(i => i.classList.remove('selected-delete'));
            confirmBtn.style.display = "none";
        }
    }

    function bulkDelete() {
        if (selectedForDeletion.length === 0) return;
        if (confirm(`Hide ${selectedForDeletion.length} selected games?`)) {
            deletedGames = [...deletedGames, ...selectedForDeletion];
            localStorage.setItem("deletedGames", JSON.stringify(deletedGames));
            selectedForDeletion = [];
            document.getElementById('confirm-delete-btn').style.display = "none";
            renderAll();
        }
    }

    function toggleFavorite(name) {
        if (favorites.includes(name)) favorites = favorites.filter(f => f !== name);
        else favorites.push(name);
        localStorage.setItem("favorites", JSON.stringify(favorites));
        renderAll();
    }

    function renderAll() {
        const favContainer = document.getElementById("favorites-container");
        favContainer.innerHTML = "";
        document.querySelectorAll("#sections-container .game-item").forEach(item => {
            const btn = item.querySelector("input[type='button']");
            const isDeleted = deletedGames.includes(btn.value);
            item.style.display = isDeleted ? "none" : "block";
            item.classList.remove('selected-delete');
            const star = item.querySelector(".star");
            if (star) star.classList.toggle("favorited", favorites.includes(btn.value));
            if (favorites.includes(btn.value) && !isDeleted) {
                const clone = item.cloneNode(true);
                clone.querySelector("input").onclick = () => btn.click();
                clone.querySelector(".star").onclick = (e) => { e.stopPropagation(); toggleFavorite(btn.value); };
                favContainer.appendChild(clone);
            }
        });
        searchGames();
    }

    function setupButtons() {
        document.querySelectorAll("#sections-container input[type='button']").forEach(btn => {
            const wrapper = document.createElement("div");
            wrapper.className = "game-item";
            btn.parentNode.insertBefore(wrapper, btn);
            wrapper.appendChild(btn);
            const star = document.createElement("span");
            star.innerHTML = "★"; star.className = "star";
            star.onclick = (e) => { e.stopPropagation(); toggleFavorite(btn.value); };
            wrapper.appendChild(star);
            const oldClick = btn.onclick;
            btn.onclick = (e) => {
                if (deleteMode) {
                    const name = btn.value;
                    if (selectedForDeletion.includes(name)) {
                        selectedForDeletion = selectedForDeletion.filter(n => n !== name);
                        wrapper.classList.remove('selected-delete');
                    } else {
                        selectedForDeletion.push(name);
                        wrapper.classList.add('selected-delete');
                    }
                    document.getElementById('confirm-delete-btn').style.display = selectedForDeletion.length > 0 ? "inline-block" : "none";
                } else if (oldClick) oldClick.call(btn, e);
            };
        });
        if (localStorage.getItem("viewMode") === "grid") toggleView();
        renderAll();
    }

    function toggleTheme() {
        const t = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
    }

    function toggleView() {
        const content = document.getElementById('main-content');
        const btn = document.getElementById('view-toggle');
        const isGrid = content.classList.toggle('grid-view');
        localStorage.setItem("viewMode", isGrid ? "grid" : "list");
        btn.innerText = isGrid ? "☰ List View" : "田 Grid View";
        document.getElementById("favorites-container").style.display = isGrid ? "grid" : "flex";
        searchGames();
    }

    function resetDeletedGames() { if (confirm("Restore everything?")) { localStorage.removeItem("deletedGames"); location.reload(); } }
    function toggleInfo() { const overlay = document.getElementById('info-overlay'); overlay.style.display = (overlay.style.display === "block") ? "none" : "block"; }
    function createParticles(e) {
        for (let i = 0; i < 8; i++) {
            const p = document.createElement("div");
            p.style.position = "fixed"; p.style.width = p.style.height = "8px";
            p.style.background = "var(--accent-color)"; p.style.borderRadius = "50%";
            p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px";
            p.style.pointerEvents = "none"; document.body.appendChild(p);
            const dx = (Math.random()-0.5)*200, dy = (Math.random()-0.5)*200;
            p.animate([{transform:'translate(0,0)', opacity:1}, {transform:`translate(${dx}px,${dy}px)`, opacity:0}], {duration:600});
            setTimeout(() => p.remove(), 600);
        }
    }
    document.addEventListener('keydown', (e) => { if (e.key === "Escape") window.location.href = "https://canvas.instructure.com"; });
    document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    setTimeout(setupButtons, 1200);
</script>
</body>
</html>
